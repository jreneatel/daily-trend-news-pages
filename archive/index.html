        :root {
          color-scheme: dark;
          --bg:#10141b;
          --bar:#151a23;

          --ink:#f7f7fb;

          --line:#3b3e50;

        .skip-link {

          padding: 8px 10px;

          background: var(--accent);
          font-weight: 800;
          text-decoration: none;
          transform: translateY(-140%);

        .skip-link:focus { transform: translateY(0); }
        .appbar {
          position: sticky;
          top: 0;
          z-index: 10;
          display: grid;
          grid-template-columns: 1fr auto 1fr;
          align-items: center;
          gap: 16px;
          height: 44px;
          padding: 0 14px;
          background: var(--bar);
          border-bottom: 1px solid #202234;
        }
        .brand {
          color: #e8e8f0;
          font-size: 18px;
          font-weight: 800;
          text-decoration: none;
        }

          content: "";

        }
        .app-date {
          color: var(--accent);
          font-weight: 700;
        }
        .app-actions {

          align-items: center;
          color: var(--muted);
          font-size: 12px;
        }
        .archive {
          color: var(--muted);
          text-decoration: none;
        }
        a:focus-visible {
          outline: 3px solid var(--accent);
          outline-offset: 3px;
        }
        .page {
          width: min(960px, 100%);
          margin: 0 auto;
          padding: 18px clamp(14px, 4vw, 32px) 64px;
        }
        .hero { padding: 0 0 16px; }
        .eyebrow {
          margin: 0 0 4px;
          color: var(--muted);
          font-size: 11px;
          font-weight: 700;
          letter-spacing: .16em;
          text-transform: uppercase;
        }
        .hero h1 {
          margin: 0;
          font-size: clamp(34px, 5vw, 48px);
          line-height: 1.08;
          letter-spacing: 0;
        }
        .badges {
          display: flex;
          flex-wrap: wrap;
          gap: 8px;
          margin-top: 10px;
        }
        .badges span {
          display: inline-flex;
          align-items: center;
          min-height: 22px;
          padding: 4px 9px;
          border-radius: 6px;
          color: #fff;
          background: #1f6f78;
          font-size: 12px;
          font-weight: 700;
        }
        .calendar {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
          gap: 14px;
        }
        .calendar-month {
          border: 1px solid var(--line);
          border-radius: 8px;
          background: var(--panel);
          padding: 14px;
        }
        .calendar-month h2 {
          margin: 0 0 12px;
          font-size: 18px;
        }
        .calendar-grid {
          display: grid;
          grid-template-columns: repeat(7, minmax(0, 1fr));
          gap: 6px;
        }
        .calendar-weekday,
        .calendar-day {
          display: grid;
          place-items: center;
          min-width: 0;
          min-height: 34px;
          border-radius: 6px;
          font-size: 13px;
        }
        .calendar-weekday {
          color: var(--muted);
          font-size: 11px;
          font-weight: 800;
        }
        .calendar-day {
          color: #777d91;
          border: 1px solid rgba(255, 255, 255, .06);
        }
        .calendar-day.is-empty {
          border-color: transparent;
        }
        .calendar-day.is-linked {
          color: #071316;
          background: var(--accent);
          border-color: var(--accent);
          font-weight: 800;
          text-decoration: none;
        }
        .calendar-day.is-linked:hover,
        .calendar-day.is-linked:focus-visible {
          background: #9be7de;
        }
        .calendar-day.is-latest {
          box-shadow: 0 0 0 2px #fff inset;
        }
        .empty {
          color: var(--muted);
          background: var(--panel);
          border: 1px solid var(--line);
          border-radius: 8px;
          padding: 14px;
        }
        @media (max-width: 900px) {
          .appbar {

            height: auto;
            padding: 10px 14px;
          }
          .app-actions {
            grid-column: 1 / -1;
            justify-content: flex-start;
          }
        }
