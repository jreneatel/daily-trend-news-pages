<!doctype html>
<html lang="ja">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Archive</title>
<style>
:root {
  color-scheme: dark;
  --bg:#10141b;
  --bar:#151a23;
  --panel:#202631;
  --panel-2:#343c48;
  --ink:#f7f7fb;
  --muted:#a3a7b7;
  --faint:#777d91;
  --line:#3b3e50;
  --accent:#4fd1c5;
  --accent-strong:#9be7de;
  --shadow:0 18px 42px rgba(0, 0, 0, .24);
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: var(--ink);
  background: var(--bg);
  line-height: 1.55;
}
.skip-link {
  position: fixed;
  left: 12px;
  top: 8px;
  z-index: 20;
  padding: 8px 10px;
  border-radius: 6px;
  color: #071316;
  background: var(--accent);
  font-weight: 800;
  text-decoration: none;
  transform: translateY(-140%);
}
.skip-link:focus {
  transform: translateY(0);
}
.appbar {
  position: sticky;
  top: 0;
  z-index: 10;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 16px;
  min-height: 56px;
  padding: 7px 14px;
  background: var(--bar);
  border-bottom: 1px solid #202234;
}
.brand {
  color: #e8e8f0;
  font-size: 18px;
  font-weight: 800;
  text-decoration: none;
}
.brand::before {
  content: "";
  display: inline-block;
  width: 14px;
  height: 12px;
  margin-right: 8px;
  border: 2px solid var(--muted);
  border-radius: 2px;
  vertical-align: -1px;
  box-shadow: inset 4px 0 0 rgba(79, 209, 197, .28);
}
.app-date {
  color: var(--accent);
  font-weight: 700;
}
.app-actions {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 14px;
  color: var(--muted);
  font-size: 12px;
}
.global-nav {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  justify-content: flex-end;
}
.global-nav a {
  display: inline-flex;
  align-items: center;
  min-height: 38px;
  padding: 7px 9px;
  border: 1px solid transparent;
  border-radius: 999px;
  color: #d8dbe7;
  font-size: 12px;
  font-weight: 750;
  text-decoration: none;
}
.global-nav a:hover,
.global-nav a:focus-visible,
.global-nav a[aria-current="page"] {
  border-color: rgba(255, 255, 255, .2);
  background: rgba(255, 255, 255, .1);
  color: #fff;
}
.global-nav .logout-link { color: #ffc9c2; }
.global-nav .login-link {
  border-color: #fbbf24;
  color: #fff7d6;
  background: rgba(251, 191, 36, .16);
}
.generated-at { white-space: nowrap; }
.archive, .back-link {
  color: var(--muted);
  text-decoration: none;
}
.page {
  width: min(1210px, 100%);
  margin: 0 auto;
  padding: 18px clamp(14px, 4vw, 32px) 64px;
}
.hero {
  padding: 0 0 16px;
}
.eyebrow {
  margin: 0 0 4px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .16em;
  text-transform: uppercase;
}
.hero h1 {
  margin: 0;
  font-size: clamp(34px, 5vw, 48px);
  line-height: 1.08;
  letter-spacing: 0;
}
.badges {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}
.badges span {
  display: inline-flex;
  align-items: center;
  min-height: 22px;
  padding: 4px 9px;
  border-radius: 6px;
  color: #fff;
  background: #1f6f78;
  font-size: 12px;
  font-weight: 700;
}
.page-actions {
  display: flex;
  justify-content: flex-end;
  margin-top: 18px;
}
.analytics-export {
  min-height: 34px;
  padding: 6px 12px;
  border: 1px solid rgba(79, 209, 197, .45);
  border-radius: 6px;
  color: #071316;
  background: var(--accent);
  font: inherit;
  font-weight: 800;
  cursor: pointer;
}
.layout {
  display: grid;
  grid-template-columns: 240px minmax(0, 1fr);
  gap: 16px;
  align-items: start;
}
.sidebar {
  position: sticky;
  top: 62px;
  overflow: hidden;
  border: 1px solid #5b6071;
  border-radius: 12px;
  background: var(--panel-2);
  box-shadow: var(--shadow);
}
.side-title {
  padding: 8px 12px;
  color: #fff;
  background: rgba(255, 255, 255, .12);
  font-weight: 800;
}
.side-nav {
  display: grid;
  padding: 10px 6px;
}
.side-calendar {
  padding: 10px 8px 8px;
  border-bottom: 1px solid var(--line);
}
.side-calendar .calendar {
  grid-template-columns: 1fr;
  gap: 0;
}
.side-calendar .calendar-month {
  padding: 10px;
  border-color: rgba(255, 255, 255, .14);
  background: rgba(255, 255, 255, .05);
}
.side-calendar .calendar-month h2 {
  margin-bottom: 8px;
  font-size: 13px;
}
.side-calendar .calendar-grid {
  gap: 3px;
}
.side-calendar .calendar-weekday,
.side-calendar .calendar-day {
  min-height: 24px;
  border-radius: 5px;
  font-size: 11px;
}
.calendar-more {
  display: block;
  margin-top: 8px;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
  text-align: right;
}
.side-archive,
.side-nav a {
  display: flex;
  justify-content: space-between;
  align-items: center;
  min-height: 32px;
  padding: 7px 9px;
  border: 1px solid transparent;
  border-radius: 8px;
  color: #fff;
  text-decoration: none;
  font-weight: 700;
}
.side-archive {
  display: none;
  margin: 10px 6px 0;
  border-color: rgba(79, 209, 197, .45);
  background: rgba(79, 209, 197, .12);
}
.side-nav a:hover,
.side-nav a:focus,
.side-archive:hover,
.side-archive:focus {
  border-color: var(--accent);
  background: rgba(169, 147, 255, .14);
}
.side-nav small,
.side-archive small {
  color: #c0c3d0;
  font-weight: 500;
}
.content {
  min-width: 0;
}
h2 {
  margin: 0;
  font-size: 20px;
  letter-spacing: 0;
}
h3 {
  margin: 8px 0;
  font-size: 16px;
  line-height: 1.48;
  letter-spacing: 0;
}
a {
  color: var(--ink);
  text-decoration: none;
}
a:focus-visible {
  outline: 3px solid var(--accent);
  outline-offset: 3px;
}
.genre-head {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: baseline;
  margin-bottom: 12px;
  cursor: pointer;
  list-style: none;
}
.genre-head::-webkit-details-marker { display: none; }
.genre-head::before {
  content: "▾";
  color: var(--accent);
  font-weight: 900;
}
.genre:not([open]) .genre-head::before {
  content: "▸";
}
.genre-head span {
  color: var(--muted);
  font-size: 12px;
}
.thumb {
  flex: 0 0 auto;
  width: 100%;
  height: 88px;
  border: 1px solid rgba(255, 255, 255, .14);
  border-radius: 10px;
  background:
    linear-gradient(135deg, rgba(169, 147, 255, .25), rgba(255, 255, 255, .05));
  object-fit: cover;
}
.genre {
  --genre:#9ca3af;
  margin-top: 24px;
}
.tone-tech { --genre:#60a5fa; }
.tone-safety { --genre:#d6a35c; }
.tone-life { --genre:#34d399; }
.tone-money { --genre:#a78bfa; }
.tone-civic { --genre:#818cf8; }
.tone-entertainment { --genre:#f472b6; }
.tone-sports { --genre:#2dd4bf; }
.tone-science { --genre:#22d3ee; }
.tone-general { --genre:#cbd5e1; }
.genre:first-child { margin-top: 0; }
.genre-head {
  border-bottom: 1px solid var(--line);
  padding-bottom: 9px;
}
.genre-head h2 { color: var(--genre); }
.grid {
  display: grid;
  gap: 7px;
}
.card {
  position: relative;
  display: grid;
  grid-template-columns: 112px minmax(0, 1fr);
  gap: 12px;
  min-width: 0;
  padding: 13px 42px 12px 12px;
  border: 1px solid var(--line);
  border-left: 5px solid var(--genre, #9ca3af);
  border-radius: 8px;
  background: var(--panel);
  color: var(--ink);
  text-decoration: none;
  transition: border-color .16s ease, box-shadow .16s ease, transform .16s ease;
}
.card.is-read {
  background: #1a2029;
  border-color: #596273;
  border-left-color: #778294;
}
.read-state {
  margin-left: auto;
  color: var(--accent-strong);
  font-weight: 800;
}
.labels {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 6px;
}
.labels span {
  padding: 2px 6px;
  border-radius: 5px;
  color: #dbe4ef;
  background: rgba(255, 255, 255, .08);
  font-size: 12px;
  font-weight: 700;
}
.card:hover,
.card:focus-visible {
  border-color: var(--accent);
  box-shadow: 0 10px 26px rgba(0, 0, 0, .20);
  transform: translateY(-1px);
}
.card::after {
  content: "↗";
  position: absolute;
  right: 12px;
  top: 50%;
  color: var(--muted);
  transform: translateY(-50%);
}
.card p { margin: 8px 0 0; font-size: 14px; }
.card .thumb {
  width: 100%;
  height: 74px;
  margin-top: 2px;
  padding: 0;
  border-radius: 8px;
}
.card-body {
  min-width: 0;
}
.card h3 {
  color: #fff;
}
.card:hover h3,
.card:focus-visible h3 {
  color: var(--accent-strong);
}
.summary-text { color: #c7cad6; }
.meta { color: var(--muted); font-size: 13px; margin: 0; }
.meta span {
  color: var(--muted);
  font-weight: 600;
}
.meta {
  display: flex;
  gap: 8px;
  align-items: center;
}
dl { margin: 10px 0 0; display: grid; gap: 8px; }
dl div {
  border-top: 1px solid #303345;
  padding-top: 8px;
}
dt {
  color: var(--faint);
  font-size: 12px;
  font-weight: 700;
}
dd {
  margin: 2px 0 0;
  font-size: 14px;
  color: #c4c7d4;
}
.empty { color: var(--muted); background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 14px; }
.archive-page { max-width: 960px; }
.archive-search {
  margin: 0 0 18px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  padding: 14px;
}
.archive-search label {
  display: block;
  margin-bottom: 8px;
  font-weight: 800;
}
.archive-search input {
  width: 100%;
  min-height: 40px;
  border: 1px solid #5b6071;
  border-radius: 6px;
  padding: 8px 10px;
  color: var(--ink);
  background: #121821;
  font: inherit;
}
.search-results {
  display: grid;
  gap: 8px;
  margin-top: 12px;
}
.search-result {
  display: grid;
  gap: 3px;
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: rgba(255, 255, 255, .04);
}
.search-result span,
.search-result small {
  color: var(--muted);
}
.weekly-grid {
  display: grid;
  gap: 14px;
}
.weekly-genre {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  padding: 14px;
}
.weekly-genre ul {
  margin: 10px 0 0;
  padding-left: 20px;
}
.weekly-genre li {
  margin: 9px 0;
}
.weekly-genre li span {
  display: block;
  color: var(--muted);
  font-size: 12px;
}
.calendar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
  gap: 14px;
}
.calendar-month {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--panel);
  padding: 14px;
}
.calendar-month h2 {
  margin: 0 0 12px;
  font-size: 18px;
}
.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(0, 1fr));
  gap: 6px;
}
.calendar-weekday,
.calendar-day {
  display: grid;
  place-items: center;
  min-width: 0;
  min-height: 34px;
  border-radius: 6px;
  font-size: 13px;
}
.calendar-weekday {
  color: var(--muted);
  font-size: 11px;
  font-weight: 800;
}
.calendar-day {
  color: var(--faint);
  border: 1px solid rgba(255, 255, 255, .06);
}
.calendar-day.is-empty {
  border-color: transparent;
}
.calendar-day.is-linked {
  color: #071316;
  background: var(--accent);
  border-color: var(--accent);
  font-weight: 800;
  text-decoration: none;
}
.calendar-day.is-linked:hover,
.calendar-day.is-linked:focus-visible {
  background: var(--accent-strong);
}
.calendar-day.is-latest {
  box-shadow: 0 0 0 2px #fff inset;
}
@media (max-width: 900px) {
  .appbar {
    grid-template-columns: 1fr auto;
    height: auto;
    padding: 10px 14px;
  }
  .app-date {
    justify-self: end;
    font-size: 13px;
  }
  .app-actions {
    grid-column: 1 / -1;
    align-items: flex-start;
    flex-direction: column;
    justify-content: flex-start;
    gap: 10px;
    font-size: 12px;
  }
  .global-nav { grid-column: 1 / -1; justify-content: flex-start; }
  .generated-at { display: none; }
  .layout { grid-template-columns: 1fr; }
  .sidebar {
    position: static;
  }
  .side-calendar {
    display: none;
  }
  .side-archive {
    display: flex;
  }
  .side-nav {
    display: flex;
    overflow-x: auto;
    padding: 8px;
  }
  .side-archive {
    margin: 8px 8px 0;
  }
  .side-nav a {
    flex: 0 0 auto;
    gap: 16px;
  }
}
@media (max-width: 560px) {
  .page { padding: 14px 12px 44px; }
  .hero h1 { font-size: 34px; }
  .badges { flex-wrap: wrap; }
  .card { padding-right: 32px; }
  .card {
    grid-template-columns: 72px minmax(0, 1fr);
    gap: 10px;
  }
  .card .thumb {
    width: 100%;
    height: 54px;
    border-radius: 8px;
  }
  .reason-row {
    border-top-color: #394352;
  }
  .reason-row dt {
    color: var(--accent-strong);
  }
}
</style>

  <script>
(() => {
  const input = document.getElementById("archive-search-input");
  const results = document.getElementById("archive-search-results");
  const dataNode = document.getElementById("archive-search-data");
  if (!input || !results || !dataNode) return;
  const items = JSON.parse(dataNode.textContent || "[]");
  const render = () => {
    const query = input.value.trim().toLowerCase();
    if (!query) {
      results.innerHTML = "";
      return;
    }
    const matches = items.filter((item) => `${item.date} ${item.genre} ${item.title} ${item.summary} ${item.source}`.toLowerCase().includes(query)).slice(0, 30);
    if (!matches.length) {
      results.innerHTML = '<p class="empty">該当する記事はありません。</p>';
      return;
    }
    results.replaceChildren(...matches.map((item) => {
      const link = document.createElement("a");
      link.className = "search-result";
      link.href = item.href;
      const title = document.createElement("strong");
      title.textContent = item.title;
      const meta = document.createElement("span");
      meta.textContent = `${item.date} · ${item.genre} · ${item.source}`;
      const summary = document.createElement("small");
      summary.textContent = item.summary;
      link.append(title, meta, summary);
      return link;
    }));
  };
  input.addEventListener("input", render);
})();
</script>
